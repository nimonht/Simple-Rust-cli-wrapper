name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: git-workflow
            archive: git-workflow-linux-amd64.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: git-workflow
            archive: git-workflow-macos-amd64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: git-workflow
            archive: git-workflow-macos-arm64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: git-workflow.exe
            archive: git-workflow-windows-amd64.zip
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.archive }} ${{ matrix.artifact }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.artifact }}" -DestinationPath "${{ matrix.archive }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate SHA256 checksums for release archives
        run: |
          echo "[INFO] Generating SHA256 checksums for release archives ..."
          cd artifacts
          : > ../SHA256SUMS
          for dir in */; do
            for file in "${dir}"*; do
              if [ -f "$file" ]; then
                basename="$(basename "$file")"
                sha256sum "$file" | sed "s|${file}|${basename}|" >> ../SHA256SUMS
              fi
            done
          done
          cd ..
          echo "[OK] SHA256SUMS:"
          cat SHA256SUMS
          cp SHA256SUMS artifacts/SHA256SUMS

      - name: Generate source tarball checksum
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          echo "[INFO] Downloading source tarball for ${tag} ..."
          curl -fSL -o "/tmp/source-${tag}.tar.gz" \
            "https://github.com/${{ github.repository }}/archive/${tag}.tar.gz"
          echo "[INFO] Computing SHA256 for source tarball ..."
          src_sha256="$(sha256sum "/tmp/source-${tag}.tar.gz" | awk '{print $1}')"
          echo "[OK] Source tarball SHA256: ${src_sha256}"
          echo ""
          echo "source_sha256=${src_sha256}" >> "$GITHUB_ENV"
          echo "" >> artifacts/SHA256SUMS
          echo "# Source tarball" >> artifacts/SHA256SUMS
          echo "${src_sha256}  ${tag}.tar.gz" >> artifacts/SHA256SUMS

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            artifacts/**/*
